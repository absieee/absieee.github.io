name: Lighthouse CI

on:
  push:
    branches: [main]

jobs:
  lighthouse:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
