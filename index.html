    /* ‚ĒÄ‚ĒÄ Entry blocks (command + response) ‚ĒÄ‚ĒÄ */

    .entry-cmd .prompt { color: var(--prompt); }

    .entry-response {

    /* ‚ĒÄ‚ĒÄ Input line ‚ĒÄ‚ĒÄ */
    #input-line {

      gap: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--sep);
      flex-shrink: 0;

    #input-line .prompt { color: var(--prompt); }

    #input {

      border: none;
      outline: none;
      color: var(--strong);
      font-family: var(--font);

    .sumfetch {

      gap: 32px;
      margin-bottom: 24px;
    }

    .sumfetch-ascii {
      color: var(--accent);
      line-height: 1.2;
      font-size: 11px;
      flex-shrink: 0;
    }

    .sumfetch-info { flex: 1; }

    .sumfetch-name {
      background: linear-gradient(90deg, #fb923c, #f43f5e, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 1px;
    }

    .sumfetch-host { color: var(--dimmed); margin-bottom: 6px; }

    .sumfetch-sep { color: var(--sep); margin: 4px 0; }

    .sumfetch-row { display: flex; gap: 0; }
    .sumfetch-key { color: #a855f7; min-width: 76px; }
    .sumfetch-colon { color: var(--dimmed); margin-right: 8px; }
    .sumfetch-val { color: var(--strong); }

    .sumfetch-hint { color: var(--prompt); margin-top: 6px; font-size: 12px; }
    .sumfetch-hint span { color: var(--text); }

    /* ‚ĒÄ‚ĒÄ Help grid ‚ĒÄ‚ĒÄ */
    .help-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 4px 16px;

    .help-row { display: flex; gap: 8px; }

    .help-desc { color: var(--text); }

    /* ‚ĒÄ‚ĒÄ Socials list ‚ĒÄ‚ĒÄ */

function typeAndRun(cmd, delay = 600) {
  let i = 0;
  input.disabled = true;
  const interval = setInterval(() => {
    input.value = cmd.slice(0, ++i);
    if (i === cmd.length) {
      clearInterval(interval);
      setTimeout(() => {
        input.value = '';
        input.disabled = false;
        input.focus();
        runCommand(cmd);
      }, 340);
    }
  }, 75);
}

async function cmdBlog() {
  try {
    const res = await fetch('https://absieee.github.io/blog/feed.xml');
    if (!res.ok) throw new Error('bad response');
    const xml = new DOMParser().parseFromString(await res.text(), 'application/xml');
    const entries = Array.from(xml.querySelectorAll('entry')).slice(0, 3);
    if (!entries.length) throw new Error('no entries');

    const rows = entries.map((entry, i) => {
      const title = entry.querySelector('title')?.textContent || 'Untitled';
      const link = entry.querySelector('link[rel="alternate"]')?.getAttribute('href')
                || entry.querySelector('link')?.getAttribute('href')
                || 'https://absieee.github.io/blog/';
      const published = entry.querySelector('published')?.textContent || '';
      const date = published
        ? new Date(published).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : '';
      const latest = i === 0 ? `<span style="color:var(--accent);font-size:11px;margin-left:6px">[latest]</span>` : '';
      return `
        <div class="blog-row">
          <span class="blog-num">[${i + 1}]</span>
          <a href="${link}" target="_blank" rel="noreferrer">${escapeHtml(title)}</a>${latest}
          ${date ? `<span class="blog-date">¬∑ ${date}</span>` : ''}
        </div>`;
    }).join('');

    return `${rows}
      <div class="blog-footer">
        <a href="https://absieee.github.io/blog/" target="_blank" rel="noreferrer">‚Üí absieee.github.io/blog</a>
      </div>`;
  } catch {
    return `couldn't fetch feed ‚ÄĒ <a href="https://absieee.github.io/blog/" target="_blank" rel="noreferrer">visit absieee.github.io/blog directly</a>`;
  }
}

  ln('<span style="color:var(--accent)">‚ĒĒ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚Ēė</span>');
  if (tennisRecord.wins + tennisRecord.losses > 0) {
    blank();
    ln(`<span style="color:var(--dimmed)">games ‚ÄĒ you: <span style="color:var(--strong)">${tennisRecord.wins}</span>  terminal: <span style="color:var(--strong)">${tennisRecord.losses}</span></span>`);
  }
  blank();
  await wait(500);

  while (you < 4 && them < 4) {
    const youMark  = playerServing  ? ' <span style="color:var(--accent)" title="serving">‚Ė∂</span>' : '';
    const themMark = !playerServing ? ' <span style="color:var(--accent)" title="serving">‚Ė∂</span>' : '';
    ln(`<span style="color:var(--dimmed)">score ‚ÄĒ you: <span style="color:var(--strong)">${PTS[you]}</span>${youMark}  terminal: <span style="color:var(--strong)">${PTS[them]}</span>${themMark}</span>`);
    await wait(150);

    let youWin;

    if (playerServing) {
      const promptLine = ln(`<span style="color:var(--prompt)">[s]erve &nbsp;[f]orehand &nbsp;[b]ackhand &nbsp;[c]slice &nbsp;[d]rop</span> <span style="color:var(--accent)">‚Ė∂</span>`);
      const key = await waitKey(['s', 'f', 'b', 'c', 'd']);
      const shot = YOUR_SERVE_SHOTS[key];
      promptLine.innerHTML = `<span style="color:var(--strong)">${shot.name}</span>`;
      await wait(260);
      youWin = Math.random() < 0.5;
      const desc = youWin ? pick(shot.win) : pick(shot.lose);
      promptLine.innerHTML = `<span style="color:var(--strong)">${shot.name}</span> ‚ÄĒ <span style="color:var(--text)">${desc}</span>`;

    } else {
      const serve = pick(TERMINAL_SERVES);
      ln(`<span style="color:var(--dimmed)">terminal: </span><span style="color:var(--text)">${serve.text}</span>`);
      await wait(550);

      if (serve.ace) {
        youWin = false;
      } else if (serve.doubleFault) {
        youWin = true;
      } else {
        const promptLine = ln(`<span style="color:var(--prompt)">return: [f]orehand &nbsp;[b]ackhand &nbsp;[l]ob &nbsp;[d]rop</span> <span style="color:var(--accent)">‚Ė∂</span>`);
        const key = await waitKey(['f', 'b', 'l', 'd']);
        const shot = YOUR_RETURN_SHOTS[key];
        promptLine.innerHTML = `<span style="color:var(--strong)">${shot.name}</span>`;
        await wait(260);
        youWin = Math.random() < 0.5;
        const desc = youWin ? pick(shot.win) : pick(shot.lose);
        promptLine.innerHTML = `<span style="color:var(--strong)">${shot.name}</span> ‚ÄĒ <span style="color:var(--text)">${desc}</span>`;
      }
    }

    await wait(380);
    if (youWin) { you++;  ln('<span style="color:#22c55e">  ‚úď your point</span>'); }
    else        { them++; ln('<span style="color:#ef4444">  ‚úó terminal\'s point</span>'); }
    blank();
    await wait(680);
    playerServing = !playerServing;
  }

  if (you >= 4) {
    tennisRecord.wins++;
    await wait(300);
    ln('<span style="color:var(--accent)">GAME, SET, MATCH ‚ÄĒ YOU WIN! ūüŹÜ</span>');
    blank();
    ln('<span style="color:var(--accent)">   .-~~~~-.</span>');
    ln("<span style=\"color:var(--accent)\">  .'  () ()'.  </span>");
    ln('<span style="color:var(--accent)"> /  () ‚ô•  () \\</span>');
    ln('<span style="color:var(--accent)">| ()  YOU  () |</span>');
    ln('<span style="color:var(--accent)"> \\  () ‚ô•  () /</span>');
    ln("<span style=\"color:var(--accent)\">  '._______.'</span>");
  } else {
    tennisRecord.losses++;
    await wait(400);
    ln('<span style="color:#ef4444">game over. terminal wins.</span>');
    await wait(600);
    blank();
    ln('<span style="color:#ef4444">FATAL ERROR: tennis.js has stopped working</span>');
    await wait(250);
    ln('<span style="color:var(--dimmed)">  at Object.smash (terminal.js:42:7)</span>');
    await wait(200);
    ln('<span style="color:var(--dimmed)">  at processNextTick (node:internal/process/task_queues:95:5)</span>');
    await wait(400);
    ln('<span style="color:#ef4444">‚Ėď‚Ėí‚ĖĎ CORE DUMP: 0xDEAD LOVE-ALL ‚ĖĎ‚Ėí‚Ėď</span>');
    await wait(200);
    ln('<span style="color:#ef4444">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span>');
    await wait(250);

    const t = document.getElementById('terminal');
    for (const x of [-7, 7, -5, 5, -3, 3, 0]) { t.style.transform = `translateX(${x}px)`; await wait(55); }
    t.style.transform = '';

    await wait(700);
    ln('<span style="color:var(--dimmed)">...</span>');
    await wait(1000);
    blank();
    ln('<span style="color:var(--accent)">boo, got you ūüėĄ</span>');
    await wait(150);
    ln("<span style=\"color:var(--dimmed)\">terminal is fine. you just can't play tennis.</span>");
  }

  input.disabled = false;
  input.focus();
}

const COMMANDS = {
  help:      cmdHelp,
  about:     cmdAbout,
  blog:      cmdBlog,
  work:      cmdWork,
  interests: cmdInterests,
  socials:   cmdSocials,
  email:     cmdEmail,
  clear:     cmdClear,
  tennis:    cmdTennis,
  exit:      () => { window.close(); return null; },
};

function runCommand(cmd) {
  const trimmed = cmd.trim().toLowerCase();
  if (!trimmed) return;
  if (trimmed.length > 40) return;
  history.unshift(trimmed);
  historyIndex = -1;

  const fn = COMMANDS[trimmed];
  if (!fn) {
    appendEntry(trimmed, `<span class="err">command not found ‚ÄĒ type 'help' for available commands</span>`);
    return;
  }

  const result = fn();
  if (result && typeof result.then === 'function') {
    appendEntry(trimmed, '<span style="color:var(--dimmed)">fetching‚Ä¶</span>');
    result.then(html => {
      if (html !== null) {
        const entries = output.querySelectorAll('.entry');
        const last = entries[entries.length - 1];
        if (last) last.querySelector('.entry-response').innerHTML = html;
      }
    });
  } else if (result !== null) {
    appendEntry(trimmed, result);
  }
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    runCommand(val);
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex < history.length - 1) {
      historyIndex++;
      input.value = history[historyIndex];
    }
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      input.value = history[historyIndex];
    } else {
      historyIndex = -1;
      input.value = '';
    }
  }

  if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value.trim().toLowerCase();
    if (!val) return;
    const matches = Object.keys(COMMANDS).filter(c => c.startsWith(val));
    if (matches.length === 1) input.value = matches[0];
  }

  if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    runCommand('clear');
  }
});
