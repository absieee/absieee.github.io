  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --text:     #a3a3a3;
      --strong:   #f5f5f5;
      --prompt:   #525252;
      --accent:   #fb923c;
      --dimmed:   #404040;
      --sep:      #2a2a2a;
      --font:     'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Terminal wrapper ── */
    #terminal {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 28px 20px;
    }

    /* ── Output area ── */
    #output {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 12px;
    }

    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--sep); border-radius: 2px; }

    /* ── Entry blocks (command + response) ── */
    .entry { margin-bottom: 16px; }

    .entry-cmd {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--strong);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .entry-cmd .prompt { color: var(--prompt); }

    .entry-response {
      padding-left: 20px;
      color: var(--text);
    }

    /* ── Input line ── */
    #input-line {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--sep);
      flex-shrink: 0;
    }

    #input-line .prompt { color: var(--prompt); }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--strong);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.75;
      caret-color: var(--accent);
    }

    /* ── Links ── */
    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    a:hover { border-bottom-color: var(--accent); }

    /* ── Sumfetch ── */
    .sumfetch {
      display: flex;
      gap: 32px;
      margin-bottom: 24px;
    }

    .sumfetch-ascii {
      color: var(--accent);
      line-height: 1.2;
      font-size: 11px;
      flex-shrink: 0;
    }

    .sumfetch-info { flex: 1; }

    .sumfetch-name {
      background: linear-gradient(90deg, #fb923c, #f43f5e, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 1px;
    }

    .sumfetch-host { color: var(--dimmed); margin-bottom: 6px; }

    .sumfetch-sep { color: var(--sep); margin: 4px 0; display: block; width: 100%; overflow: hidden; white-space: nowrap; }

    .sumfetch-row { display: flex; gap: 0; }
    .sumfetch-key { color: #a855f7; min-width: 76px; }
    .sumfetch-colon { color: var(--dimmed); margin-right: 8px; }
    .sumfetch-val { color: var(--strong); }

    .sumfetch-hint { color: var(--prompt); margin-top: 6px; font-size: 12px; }
    .sumfetch-hint span { color: var(--text); }

    /* ── Help grid ── */
    .help-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 4px 16px;
    }

    .help-row { display: flex; gap: 8px; }
    .help-cmd { color: var(--accent); min-width: 80px; }
    .help-desc { color: var(--text); }

    /* ── Socials list ── */
    .social-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 4px;
    }

    .social-platform { color: var(--prompt); min-width: 72px; }

    /* ── Blog entries ── */
    .blog-row { margin-bottom: 6px; }
    .blog-num { color: var(--prompt); margin-right: 8px; }
    .blog-date { color: var(--dimmed); margin-left: 8px; font-size: 12px; }
    .blog-footer { color: var(--dimmed); margin-top: 8px; font-size: 12px; }

    /* ── Error text ── */
    .err { color: #f43f5e; }

    /* ── Role header ── */
    #role-header {
      padding: 18px 0 14px;
      border-bottom: 1px solid #161616;
      flex-shrink: 0;
    }

    #role-header .role-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--strong);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    #role-header .role-sub {
      font-size: 12px;
      color: var(--dimmed);
      margin-top: 2px;
    }

    /* ── Testimonial strip ── */
    #testimonial-strip {
      flex-shrink: 0;
      padding: 10px 0 14px;
      border-top: 1px solid #111;
    }

    .t-inner {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .t-mark {
      color: var(--accent);
      font-size: 18px;
      line-height: 1;
      margin-top: 1px;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .t-body { flex: 1; }

    .t-quote {
      font-size: 11px;
      color: #525252;
      font-style: italic;
      line-height: 1.55;
    }

    .t-author {
      font-size: 10px;
      color: #383838;
      margin-top: 3px;
    }

    .t-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      margin-top: 6px;
    }

    .t-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #222;
      cursor: pointer;
      transition: background 0.2s;
    }

    .t-dot.active { background: var(--accent); }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      #terminal { padding: 20px 16px 16px; }
      .sumfetch { flex-direction: column; gap: 16px; }
      .sumfetch-ascii { display: none; }
    }
  </style>
</head>

function typeAndRun(cmd, delay = 600) {
  let i = 0;
  input.disabled = true;
  const interval = setInterval(() => {
    input.value = cmd.slice(0, ++i);
    if (i === cmd.length) {
      clearInterval(interval);
      setTimeout(() => {
        input.value = '';
        input.disabled = false;
        input.focus();
        runCommand(cmd);
      }, 340);
    }
  }, 75);
}

function appendEntry(cmd, responseHtml) {
  const entry = document.createElement('div');
  entry.className = 'entry';
  entry.innerHTML = `
    <div class="entry-cmd">
      <span class="prompt">$</span>
      <span>${escapeHtml(cmd)}</span>
    </div>
    <div class="entry-response">${responseHtml}</div>`;
  output.appendChild(entry);
  output.scrollTop = output.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function cmdBlog() {
  try {
    const res = await fetch('https://absieee.github.io/blog/feed.xml');
    if (!res.ok) throw new Error('bad response');
    const xml = new DOMParser().parseFromString(await res.text(), 'application/xml');
    const entries = Array.from(xml.querySelectorAll('entry')).slice(0, 3);
    if (!entries.length) throw new Error('no entries');

    const rows = entries.map((entry, i) => {
      const title = entry.querySelector('title')?.textContent || 'Untitled';
      const link = entry.querySelector('link[rel="alternate"]')?.getAttribute('href')
                || entry.querySelector('link')?.getAttribute('href')
                || 'https://absieee.github.io/blog/';
      const published = entry.querySelector('published')?.textContent || '';
      const date = published
        ? new Date(published).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : '';
      const latest = i === 0 ? `<span style="color:var(--accent);font-size:11px;margin-left:6px">[latest]</span>` : '';
      return `
        <div class="blog-row">
          <span class="blog-num">[${i + 1}]</span>
          <a href="${link}" target="_blank" rel="noreferrer">${escapeHtml(title)}</a>${latest}
          ${date ? `<span class="blog-date">· ${date}</span>` : ''}
        </div>`;
    }).join('');

    return `${rows}
      <div class="blog-footer">
        <a href="https://absieee.github.io/blog/" target="_blank" rel="noreferrer">→ absieee.github.io/blog</a>
      </div>`;
  } catch {
    return `couldn't fetch feed — <a href="https://absieee.github.io/blog/" target="_blank" rel="noreferrer">visit absieee.github.io/blog directly</a>`;
  }
}

async function playTennis(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  input.disabled = true;

  const wait = ms => new Promise(r => setTimeout(r, ms));

  const ln = (html = '', color = null) => {
    const d = document.createElement('div');
    d.style.lineHeight = '1.65';
    if (color) d.style.color = color;
    d.innerHTML = html;
    container.appendChild(d);
    output.scrollTop = output.scrollHeight;
    return d;
  };
  const blank = () => ln('&nbsp;');

  const waitKey = keys => new Promise(resolve => {
    const h = e => {
      const k = e.key.toLowerCase();
      if (keys.includes(k)) { e.preventDefault(); document.removeEventListener('keydown', h); resolve(k); }
    };
    document.addEventListener('keydown', h);
  });

  // Your shots when serving
  const YOUR_SERVE_SHOTS = {
    s: { name: 'serve',
         win:  ['ACE — clean, unreturnable 🎾', 'serve winner down the T 🎾'],
         lose: ['double fault 😬', 'serve slapped back for a winner'] },
    f: { name: 'forehand',
         win:  ['forehand WINNER down the line 🎾', 'forehand cross-court — too good 🎾'],
         lose: ['forehand out — clipped the baseline tape', 'forehand dragged wide under pressure'] },
    b: { name: 'backhand',
         win:  ['backhand WINNER cross-court 🎾', 'backhand down the line — unstoppable 🎾'],
         lose: ['backhand clips the net', 'backhand wide — panic shot'] },
    c: { name: 'slice',
         win:  ['slice drifts just out of reach 🎾', 'sliced cross-court, terminal nets the reply'],
         lose: ['slice sits up — put away easily', 'slice too short — smashed for a winner'] },
    d: { name: 'drop shot',
         win:  ['drop shot — barely clears, lands and dies 🎾', 'drop shot winner — terminal was miles back'],
         lose: ['drop shot telegraphed — terminal pounces', 'drop shot clips the net cord'] },
  };

  // Your shots when returning terminal's serve
  const YOUR_RETURN_SHOTS = {
    f: { name: 'forehand return',
         win:  ['return WINNER down the line 🎾', 'forehand return drilled cross-court — no chance 🎾'],
         lose: ['return long — pace was too much', 'forehand return into the net'] },
    b: { name: 'backhand return',
         win:  ['backhand return WINNER 🎾', 'chipped backhand return — terminal wrong-footed 🎾'],
         lose: ['backhand return wide — stretch too far', 'backhand return clipped the net'] },
    l: { name: 'lob',
         win:  ['lob over the charging terminal — lands in 🎾', 'perfect lob, terminal scrambles but it\'s past 🎾'],
         lose: ['lob goes long', 'lob sat up — overhead smashed away'] },
    d: { name: 'drop shot',
         win:  ['drop shot off the return — terminal had no chance 🎾', 'cheeky drop shot return — complete surprise 🎾'],
         lose: ['drop shot read early — terminal strolls up and puts it away', 'drop shot hits the tape'] },
  };

  // Terminal's serves (shown before your return)
  const TERMINAL_SERVES = [
    { text: 'kicker out wide — you\'re stretched', ace: false },
    { text: 'flat serve down the T — it\'s in', ace: false },
    { text: 'heavy topspin to the backhand', ace: false },
    { text: 'wide to the forehand — you\'re on the run', ace: false },
    { text: 'ACE — down the T, you never got near it', ace: true },
    { text: 'double fault 😬 — point to you', ace: false, doubleFault: true },
  ];

  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  const PTS = ['0', '15', '30', '40'];
  let you = 0, them = 0;
  let playerServing = true; // alternates each point

  ln('<span style="color:var(--accent)">┌────────────────────────────┐</span>');
  ln('<span style="color:var(--accent)">│   TERMINAL TENNIS          │</span>');
  ln('<span style="color:var(--accent)">│   you vs the machine       │</span>');
  ln('<span style="color:var(--accent)">└────────────────────────────┘</span>');
  if (tennisRecord.wins + tennisRecord.losses > 0) {
    blank();
    ln(`<span style="color:var(--dimmed)">games — you: <span style="color:var(--strong)">${tennisRecord.wins}</span>  terminal: <span style="color:var(--strong)">${tennisRecord.losses}</span></span>`);
  }
  blank();
  await wait(500);

  while (you < 4 && them < 4) {
    const youMark  = playerServing  ? ' <span style="color:var(--accent)" title="serving">▶</span>' : '';
    const themMark = !playerServing ? ' <span style="color:var(--accent)" title="serving">▶</span>' : '';
    ln(`<span style="color:var(--dimmed)">score — you: <span style="color:var(--strong)">${PTS[you]}</span>${youMark}  terminal: <span style="color:var(--strong)">${PTS[them]}</span>${themMark}</span>`);
    await wait(150);

    let youWin;

    if (playerServing) {
      const promptLine = ln(`<span style="color:var(--prompt)">[s]erve &nbsp;[f]orehand &nbsp;[b]ackhand &nbsp;[c]slice &nbsp;[d]rop</span> <span style="color:var(--accent)">▶</span>`);
      const key = await waitKey(['s', 'f', 'b', 'c', 'd']);
      const shot = YOUR_SERVE_SHOTS[key];
      promptLine.innerHTML = `<span style="color:var(--strong)">${shot.name}</span>`;
      await wait(260);
      youWin = Math.random() < 0.5;
      const desc = youWin ? pick(shot.win) : pick(shot.lose);
      promptLine.innerHTML = `<span style="color:var(--strong)">${shot.name}</span> — <span style="color:var(--text)">${desc}</span>`;

    } else {
      const serve = pick(TERMINAL_SERVES);
      ln(`<span style="color:var(--dimmed)">terminal: </span><span style="color:var(--text)">${serve.text}</span>`);
      await wait(550);

      if (serve.ace) {
        youWin = false;
      } else if (serve.doubleFault) {
        youWin = true;
      } else {
        const promptLine = ln(`<span style="color:var(--prompt)">return: [f]orehand &nbsp;[b]ackhand &nbsp;[l]ob &nbsp;[d]rop</span> <span style="color:var(--accent)">▶</span>`);
        const key = await waitKey(['f', 'b', 'l', 'd']);
        const shot = YOUR_RETURN_SHOTS[key];
        promptLine.innerHTML = `<span style="color:var(--strong)">${shot.name}</span>`;
        await wait(260);
        youWin = Math.random() < 0.5;
        const desc = youWin ? pick(shot.win) : pick(shot.lose);
        promptLine.innerHTML = `<span style="color:var(--strong)">${shot.name}</span> — <span style="color:var(--text)">${desc}</span>`;
      }
    }

    await wait(380);
    if (youWin) { you++;  ln('<span style="color:#22c55e">  ✓ your point</span>'); }
    else        { them++; ln('<span style="color:#ef4444">  ✗ terminal\'s point</span>'); }
    blank();
    await wait(680);
    playerServing = !playerServing;
  }

  if (you >= 4) {
    tennisRecord.wins++;
    await wait(300);
    ln('<span style="color:var(--accent)">GAME, SET, MATCH — YOU WIN! 🏆</span>');
    blank();
    ln('<span style="color:var(--accent)">   .-~~~~-.</span>');
    ln("<span style=\"color:var(--accent)\">  .'  () ()'.  </span>");
    ln('<span style="color:var(--accent)"> /  () ♥  () \\</span>');
    ln('<span style="color:var(--accent)">| ()  YOU  () |</span>');
    ln('<span style="color:var(--accent)"> \\  () ♥  () /</span>');
    ln("<span style=\"color:var(--accent)\">  '._______.'</span>");
  } else {
    tennisRecord.losses++;
    await wait(400);
    ln('<span style="color:#ef4444">game over. terminal wins.</span>');
    await wait(600);
    blank();
    ln('<span style="color:#ef4444">FATAL ERROR: tennis.js has stopped working</span>');
    await wait(250);
    ln('<span style="color:var(--dimmed)">  at Object.smash (terminal.js:42:7)</span>');
    await wait(200);
    ln('<span style="color:var(--dimmed)">  at processNextTick (node:internal/process/task_queues:95:5)</span>');
    await wait(400);
    ln('<span style="color:#ef4444">▓▒░ CORE DUMP: 0xDEAD LOVE-ALL ░▒▓</span>');
    await wait(200);
    ln('<span style="color:#ef4444">████████████████████████████████████████</span>');
    await wait(250);

    const t = document.getElementById('terminal');
    for (const x of [-7, 7, -5, 5, -3, 3, 0]) { t.style.transform = `translateX(${x}px)`; await wait(55); }
    t.style.transform = '';

    await wait(700);
    ln('<span style="color:var(--dimmed)">...</span>');
    await wait(1000);
    blank();
    ln('<span style="color:var(--accent)">boo, got you 😄</span>');
    await wait(150);
    ln("<span style=\"color:var(--dimmed)\">terminal is fine. you just can't play tennis.</span>");
  }

  input.disabled = false;
  input.focus();
}

const COMMANDS = {
  about:     cmdAbout,
  work:      cmdWork,
  blog:      cmdBlog,
  life:      cmdInterests,
  data:      cmdData,
  email:     cmdEmail,
  socials:   cmdSocials,
  tennis:    cmdTennis,
  clear:     cmdClear,
  help:      cmdHelp,
  exit:      () => { window.close(); return null; },
};

function runCommand(cmd) {
  const trimmed = cmd.trim().toLowerCase();
  if (!trimmed) return;
  if (trimmed.length > 40) return;
  history.unshift(trimmed);
  historyIndex = -1;

  const fn = COMMANDS[trimmed];
  if (!fn) {
    appendEntry(trimmed, `<span class="err">command not found — type 'help' for available commands</span>`);
    return;
  }

  const result = fn();
  if (result && typeof result.then === 'function') {
    appendEntry(trimmed, '<span style="color:var(--dimmed)">fetching…</span>');
    result.then(html => {
      if (html !== null) {
        const entries = output.querySelectorAll('.entry');
        const last = entries[entries.length - 1];
        if (last) last.querySelector('.entry-response').innerHTML = html;
      }
    });
  } else if (result !== null) {
    appendEntry(trimmed, result);
  }
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    runCommand(val);
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex < history.length - 1) {
      historyIndex++;
      input.value = history[historyIndex];
    }
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      input.value = history[historyIndex];
    } else {
      historyIndex = -1;
      input.value = '';
    }
  }

  if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value.trim().toLowerCase();
    if (!val) return;
    const matches = Object.keys(COMMANDS).filter(c => c.startsWith(val));
    if (matches.length === 1) input.value = matches[0];
  }

  if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    runCommand('clear');
  }
});

    function initTestimonials() {
      if (!Array.isArray(window.TESTIMONIALS) || TESTIMONIALS.length === 0) return;

      const quotes = [...TESTIMONIALS];
      for (let i = quotes.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [quotes[i], quotes[j]] = [quotes[j], quotes[i]];
      }

      let current = 0;
      const quoteEl = document.getElementById('t-quote');
      const authorEl = document.getElementById('t-author');
      const dotsEl = document.getElementById('t-dots');
      if (!quoteEl || !authorEl || !dotsEl) return;

      quotes.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 't-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => show(i));
        dotsEl.appendChild(dot);
      });

      function show(i) {
        current = i;
        const t = quotes[i];
        quoteEl.textContent = t.quote || '';
        authorEl.textContent = t.author ? '— ' + t.author + (t.role ? ', ' + t.role : '') : '';
        dotsEl.querySelectorAll('.t-dot').forEach((d, j) => {
          d.classList.toggle('active', j === i);
        });
      }

      show(0);
      setInterval(() => show((current + 1) % quotes.length), 6000);
    }

    initTestimonials();
  </script>
